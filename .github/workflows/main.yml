- name: "🧩 Phase 2.5: Configure Chrome for Testing"
  run: |
    $ErrorActionPreference = 'Stop'

    # ------------------------------------------------------------
    # Configuration
    # ------------------------------------------------------------
    $customZipUrl = "https://github.com/mitsox771/Metox/releases/download/V1.4/CustomProfile.zip"
    $startupUrl   = "https://fabric-x-xi.vercel.app/"

    $fabricRoot    = "C:\ProgramData\RDPFabric"
    $zipPath       = Join-Path $fabricRoot "CustomProfile.zip"
    $extractPath   = Join-Path $fabricRoot "Extracted"
    $extensionsDir = Join-Path $fabricRoot "Extensions"
    $browserDir    = Join-Path $fabricRoot "ChromeForTesting"
    $bootstrapPath = Join-Path $fabricRoot "ChromeBootstrap.ps1"

    New-Item -ItemType Directory -Path $fabricRoot, $extensionsDir -Force |
      Out-Null

    # ------------------------------------------------------------
    # Download extension bundle
    # ------------------------------------------------------------
    Write-Host "Downloading extension bundle..." -ForegroundColor Cyan

    $downloaded = $false

    for ($attempt = 1; $attempt -le 5; $attempt++) {
        try {
            Invoke-WebRequest `
              -Uri $customZipUrl `
              -OutFile $zipPath `
              -UseBasicParsing

            if ((Test-Path $zipPath) -and
                ((Get-Item $zipPath).Length -gt 0)) {
                $downloaded = $true
                break
            }
        }
        catch {
            Write-Warning "Attempt $attempt failed: $($_.Exception.Message)"

            if ($attempt -lt 5) {
                Start-Sleep -Seconds 5
            }
        }
    }

    if (-not $downloaded) {
        throw "Failed to download CustomProfile.zip."
    }

    Unblock-File -Path $zipPath -ErrorAction SilentlyContinue

    Remove-Item $extractPath -Recurse -Force -ErrorAction SilentlyContinue
    Remove-Item $extensionsDir -Recurse -Force -ErrorAction SilentlyContinue

    New-Item -ItemType Directory -Path $extractPath, $extensionsDir -Force |
      Out-Null

    Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

    # ------------------------------------------------------------
    # Find and validate unpacked extensions
    # ------------------------------------------------------------
    $manifestFiles = @(
        Get-ChildItem `
          -Path $extractPath `
          -Filter "manifest.json" `
          -File `
          -Recurse
    )

    if ($manifestFiles.Count -eq 0) {
        throw "No manifest.json files were found in CustomProfile.zip."
    }

    $extensionPaths = [System.Collections.Generic.List[string]]::new()
    $extensionNumber = 0

    foreach ($manifestFile in $manifestFiles) {
        $extensionNumber++

        try {
            $manifest = Get-Content $manifestFile.FullName -Raw |
              ConvertFrom-Json
        }
        catch {
            throw "Invalid manifest: $($manifestFile.FullName)"
        }

        if (-not $manifest.manifest_version) {
            throw "manifest_version is missing: $($manifestFile.FullName)"
        }

        $sourceDirectory = $manifestFile.Directory.FullName
        $sourceName = Split-Path $sourceDirectory -Leaf

        # *, :, ?, quotes and several other characters are invalid
        # in Windows directory names.
        $safeName = $sourceName -replace '[^A-Za-z0-9._-]', '_'

        if ([string]::IsNullOrWhiteSpace($safeName)) {
            $safeName = "Extension"
        }

        $safeName = "{0:D2}-{1}" -f $extensionNumber, $safeName
        $destination = Join-Path $extensionsDir $safeName

        New-Item -ItemType Directory -Path $destination -Force |
          Out-Null

        Copy-Item `
          -Path (Join-Path $sourceDirectory "*") `
          -Destination $destination `
          -Recurse `
          -Force

        if (-not (Test-Path (Join-Path $destination "manifest.json"))) {
            throw "Extension copy failed: $destination"
        }

        $extensionPaths.Add($destination)

        $displayName = if ($manifest.name) {
            $manifest.name
        }
        else {
            $safeName
        }

        Write-Host "Prepared extension: $displayName" `
          -ForegroundColor Green
    }

    # ------------------------------------------------------------
    # Download Chrome for Testing
    #
    # Official Google Chrome 137+ ignores --load-extension.
    # Chrome for Testing continues to support it.
    # ------------------------------------------------------------
    Write-Host "Downloading Chrome for Testing..." `
      -ForegroundColor Cyan

    $metadataUrl = "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json"
    $metadata = Invoke-RestMethod -Uri $metadataUrl

    $chromeDownload = $metadata.channels.Stable.downloads.chrome |
      Where-Object { $_.platform -eq "win64" } |
      Select-Object -First 1

    if (-not $chromeDownload.url) {
        throw "Chrome for Testing win64 download was not found."
    }

    $browserZip = Join-Path $fabricRoot "chrome-for-testing.zip"

    Invoke-WebRequest `
      -Uri $chromeDownload.url `
      -OutFile $browserZip `
      -UseBasicParsing

    Remove-Item $browserDir -Recurse -Force -ErrorAction SilentlyContinue
    New-Item -ItemType Directory -Path $browserDir -Force | Out-Null

    Expand-Archive `
      -Path $browserZip `
      -DestinationPath $browserDir `
      -Force

    $chromePath = Get-ChildItem `
      -Path $browserDir `
      -Filter "chrome.exe" `
      -File `
      -Recurse |
      Select-Object -First 1 -ExpandProperty FullName

    if (-not $chromePath -or -not (Test-Path $chromePath)) {
        throw "Chrome for Testing executable was not found."
    }

    Write-Host "Browser: $chromePath" -ForegroundColor Green

    # ------------------------------------------------------------
    # Chrome policies
    # ------------------------------------------------------------
    $chromePolicyPath = "HKLM:\SOFTWARE\Policies\Google\Chrome"

    New-Item -Path $chromePolicyPath -Force | Out-Null

    # Display the bookmark bar.
    New-ItemProperty `
      -Path $chromePolicyPath `
      -Name "BookmarkBarEnabled" `
      -PropertyType DWord `
      -Value 1 `
      -Force |
      Out-Null

    # Startup URLs are a registry list, not a JSON string.
    New-ItemProperty `
      -Path $chromePolicyPath `
      -Name "RestoreOnStartup" `
      -PropertyType DWord `
      -Value 4 `
      -Force |
      Out-Null

    $startupPolicyPath = Join-Path `
      $chromePolicyPath `
      "RestoreOnStartupURLs"

    Remove-Item $startupPolicyPath `
      -Recurse `
      -Force `
      -ErrorAction SilentlyContinue

    New-Item -Path $startupPolicyPath -Force | Out-Null

    New-ItemProperty `
      -Path $startupPolicyPath `
      -Name "1" `
      -PropertyType String `
      -Value $startupUrl `
      -Force |
      Out-Null

    # ------------------------------------------------------------
    # Convert bookmarks HTML to ManagedBookmarks policy
    # ------------------------------------------------------------
    $bookmarkObjects = @(
        @{
            toplevel_name = "RDP Fabric"
        }
    )

    $htmlFile = Get-ChildItem `
      -Path $extractPath `
      -Filter "*.html" `
      -File `
      -Recurse |
      Select-Object -First 1

    if ($htmlFile) {
        $htmlContent = Get-Content $htmlFile.FullName -Raw
        $bookmarkRegex = [regex]::new(
            '<A\s+[^>]*HREF="([^"]+)"[^>]*>([^<]+)</A>',
            [System.Text.RegularExpressions.RegexOptions]::IgnoreCase
        )

        $bookmarkMatches = $bookmarkRegex.Matches($htmlContent)

        foreach ($bookmarkMatch in $bookmarkMatches) {
            $bookmarkUrl = [System.Net.WebUtility]::HtmlDecode(
                $bookmarkMatch.Groups[1].Value
            )

            $bookmarkName = [System.Net.WebUtility]::HtmlDecode(
                $bookmarkMatch.Groups[2].Value
            ).Trim()

            if ($bookmarkUrl -and $bookmarkName) {
                $bookmarkObjects += @{
                    name = $bookmarkName
                    url  = $bookmarkUrl
                }
            }
        }

        Write-Host "Imported $($bookmarkMatches.Count) bookmarks."
    }
    else {
        Write-Warning "No bookmarks HTML file was found."
    }

    $bookmarkJson = $bookmarkObjects |
      ConvertTo-Json -Depth 20 -Compress

    New-ItemProperty `
      -Path $chromePolicyPath `
      -Name "ManagedBookmarks" `
      -PropertyType String `
      -Value $bookmarkJson `
      -Force |
      Out-Null

    # ------------------------------------------------------------
    # Create login bootstrap
    # ------------------------------------------------------------
    $joinedExtensionPaths = $extensionPaths -join ","

    $bootstrapTemplate = @'
    $ErrorActionPreference = "Stop"

    $chromePath    = '__CHROME_PATH__'
    $extensionArg = '__EXTENSION_PATHS__'
    $startupUrl   = '__STARTUP_URL__'

    $logRoot = Join-Path $env:LOCALAPPDATA "RDPFabric"
    $profile = Join-Path $logRoot "ChromeProfile"
    $logPath = Join-Path $logRoot "chrome-bootstrap.log"

    New-Item -ItemType Directory -Path $logRoot, $profile -Force |
        Out-Null

    try {
        Start-Transcript -Path $logPath -Append | Out-Null

        # Avoid a previously running browser swallowing the arguments.
        Get-Process chrome -ErrorAction SilentlyContinue |
            Where-Object {
                $_.Path -eq $chromePath
            } |
            Stop-Process -Force -ErrorAction SilentlyContinue

        $arguments = @(
            "--user-data-dir=`"$profile`""
            "--no-first-run"
            "--no-default-browser-check"
            "--load-extension=`"$extensionArg`""
            "--new-window"
            "`"$startupUrl`""
        ) -join " "

        $processInfo = New-Object System.Diagnostics.ProcessStartInfo
        $processInfo.FileName = $chromePath
        $processInfo.Arguments = $arguments
        $processInfo.UseShellExecute = $true

        [System.Diagnostics.Process]::Start($processInfo) | Out-Null
    }
    catch {
        Add-Content `
          -Path $logPath `
          -Value "ERROR: $($_.Exception.Message)"

        throw
    }
    finally {
        try {
            Stop-Transcript | Out-Null
        }
        catch {}
    }
    '@

    $bootstrapScript = $bootstrapTemplate `
      .Replace(
          "__CHROME_PATH__",
          $chromePath.Replace("'", "''")
      ) `
      .Replace(
          "__EXTENSION_PATHS__",
          $joinedExtensionPaths.Replace("'", "''")
      ) `
      .Replace(
          "__STARTUP_URL__",
          $startupUrl.Replace("'", "''")
      )

    Set-Content `
      -Path $bootstrapPath `
      -Value $bootstrapScript `
      -Encoding UTF8 `
      -Force

    # ------------------------------------------------------------
    # Permissions
    # ------------------------------------------------------------
    $account = "$env:COMPUTERNAME\$env:RDP_USER"

    & icacls.exe $fabricRoot `
      /grant "${account}:(OI)(CI)F" `
      /T `
      /C |
      Out-Null

    if ($LASTEXITCODE -ne 0) {
        throw "Failed to grant FabricAdmin access to $fabricRoot."
    }

    # ------------------------------------------------------------
    # Desktop shortcut
    # ------------------------------------------------------------
    $desktopPath = "C:\Users\$env:RDP_USER\Desktop"
    New-Item -ItemType Directory -Path $desktopPath -Force | Out-Null

    $shortcutPath = Join-Path `
      $desktopPath `
      "Chrome for Testing - Fabric.lnk"

    $shell = New-Object -ComObject WScript.Shell
    $shortcut = $shell.CreateShortcut($shortcutPath)

    $shortcut.TargetPath = "powershell.exe"
    $shortcut.Arguments = (
        '-NoProfile -ExecutionPolicy Bypass -File "{0}"' -f
        $bootstrapPath
    )
    $shortcut.WorkingDirectory = $fabricRoot
    $shortcut.IconLocation = "$chromePath,0"
    $shortcut.Description = "Launch Fabric extensions in Chrome for Testing"
    $shortcut.Save()

    # ------------------------------------------------------------
    # Scheduled login task
    # ------------------------------------------------------------
    $taskName = "RDPFabric-ChromeBootstrap"

    $taskArguments = (
        '-NoProfile -ExecutionPolicy Bypass ' +
        '-WindowStyle Hidden -File "{0}"' -f $bootstrapPath
    )

    $taskAction = New-ScheduledTaskAction `
      -Execute "powershell.exe" `
      -Argument $taskArguments

    $taskTrigger = New-ScheduledTaskTrigger `
      -AtLogOn `
      -User $account

    $taskTrigger.Delay = "PT10S"

    $taskPrincipal = New-ScheduledTaskPrincipal `
      -UserId $account `
      -LogonType Interactive `
      -RunLevel Limited

    $taskSettings = New-ScheduledTaskSettingsSet `
      -AllowStartIfOnBatteries `
      -DontStopIfGoingOnBatteries `
      -ExecutionTimeLimit (New-TimeSpan -Minutes 5)

    Register-ScheduledTask `
      -TaskName $taskName `
      -Action $taskAction `
      -Trigger $taskTrigger `
      -Principal $taskPrincipal `
      -Settings $taskSettings `
      -Description "Launch Chrome for Testing with authorized unpacked extensions." `
      -Force |
      Out-Null

    Write-Host ""
    Write-Host "Chrome extension automation configured." `
      -ForegroundColor Green
    Write-Host "Extensions: $($extensionPaths.Count)"
    Write-Host "Browser: $chromePath"
    Write-Host "Task: $taskName"
