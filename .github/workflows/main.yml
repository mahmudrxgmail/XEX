      - name: "⏳ Session Hold v4 + Self-Healing Sentinel + Handoff"
        if: "always() && inputs.quick_test == false"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          . "C:\Apex\scripts\APEX-Core.ps1"
          Start-Transcript -Path "C:\Apex\logs\session.log" -Append

          if (-not $Global:Apex.TailscaleIP) { Write-ApexEvent 'WARN' "No Tailscale IP — skipping hold"; Stop-Transcript; exit 0 }

          $sessMin  = $Global:Apex.RuntimeMinutes
          $endTime  = (Get-Date).AddMinutes($sessMin)
          Write-ApexEvent 'SUCCESS' "APEX-ULTIMA v4.0 SESSION ACTIVE"
          Write-Host "   Host: $($Global:Apex.Hostname) | IP: $($Global:Apex.TailscaleIP) | Runtime: ${sessMin}m" -ForegroundColor Cyan

          # ── Self-Healing Sentinel (background) ──────────────────────────
          $sentinel = {
              param($TsPath, $AuthKey, $Hostname, $MatrixId, $EventsLog, $EndTime)
              $healCount = 0
              while ((Get-Date) -lt $EndTime) {
                  Start-Sleep -Seconds 60
                  try {
                      # Tailscale health
                      $tsOk = $false
                      try { $st = & $TsPath status --json 2>$null | ConvertFrom-Json -ErrorAction Stop; $tsOk = ($st -and $st.BackendState -eq "Running") } catch {}
                      if (-not $tsOk) {
                          & $TsPath up --authkey="$AuthKey" --hostname="$Hostname" --unattended --accept-routes --accept-dns=$false 2>$null | Out-Null
                          $healCount++; Add-Content $EventsLog -Value ([ordered]@{ts=(Get-Date).ToString("o");level="WARN";msg="Sentinel: Tailscale re-up";matrix=$MatrixId} | ConvertTo-Json -Compress) -Encoding utf8
                      }
                      # RDP service
                      $svc = Get-Service TermService -ErrorAction SilentlyContinue
                      if (-not $svc -or $svc.Status -ne 'Running') {
                          Restart-Service TermService -Force -ErrorAction SilentlyContinue
                          $healCount++; Add-Content $EventsLog -Value ([ordered]@{ts=(Get-Date).ToString("o");level="WARN";msg="Sentinel: TermService restart";matrix=$MatrixId} | ConvertTo-Json -Compress) -Encoding utf8
                      }
                      # Idle task
                      $task = Get-ScheduledTask -TaskName "APEX-IdleJiggler" -ErrorAction SilentlyContinue
                      if (-not $task -or $task.State -ne 'Ready') { Start-ScheduledTask -TaskName "APEX-IdleJiggler" -ErrorAction SilentlyContinue; $healCount++ }
                      # Memory trim (every 5 cycles)
                      if (([math]::Floor(((Get-Date) - [datetime]::Parse('2000-01-01')).TotalSeconds / 60) % 5) -eq 0) {
                          Start-Process -FilePath "$env:WINDIR\System32\rundll32.exe" -ArgumentList "advapi32.dll,ProcessIdleTasks" -Wait -ErrorAction SilentlyContinue
                          Get-Process -ErrorAction SilentlyContinue | Where-Object { $_.WS -gt 80MB -and $_.ProcessName -notin 'svchost','tailscaled','wscript','powershell','pwsh' } | ForEach-Object { try { $_.MinimizeWorkingSet() } catch {} }
                      }
                  } catch { Add-Content $EventsLog -Value ([ordered]@{ts=(Get-Date).ToString("o");level="ERROR";msg="Sentinel: $($_.Exception.Message)";matrix=$MatrixId} | ConvertTo-Json -Compress) -Encoding utf8 }
              }
          }
          $tsPath = "C:\Program Files\Tailscale\tailscale.exe"
          $sentinelJob = Start-Job -ScriptBlock $sentinel -ArgumentList $tsPath, $env:TS_KEY, $Global:Apex.Hostname, $Global:Apex.MatrixId, $Global:Apex.EventsLog, $endTime -Name "ApexSentinel"
          Write-ApexEvent 'SUCCESS' "Sentinel started (PID $($sentinelJob.Id))"

          # ── Heartbeat + Dashboard loop ──────────────────────────────────
          $lastHB = Get-Date; $hbIntervalMin = 40
          $lastDashboard = Get-Date; $dashboardIntervalSec = 60
          while ((Get-Date) -lt $endTime.AddMinutes(-1)) {
              $now = Get-Date
              if ([bool]::Parse($env:ENABLE_HEARTBEAT) -and ($now - $lastHB).TotalMinutes -ge $hbIntervalMin) {
                  $metrics = Get-SystemMetrics
                  Write-ApexMetric $metrics
                  $hbText = "💓 *APEX v$($Global:Apex.Version) Heartbeat*`nUptime: $([math]::Round(($now - $Global:Apex.StartTime).TotalMinutes,1))m`nRAM: $($metrics.free_ram_gb)GB free`nCPU: $($metrics.cpu_load_pct)%`nHost: $($Global:Apex.Hostname)"
                  Send-ApexTelegram $hbText | Out-Null
                  $lastHB = $now
              }
              if (($now - $lastDashboard).TotalSeconds -ge $dashboardIntervalSec) { Write-ApexDashboard; $lastDashboard = $now }
              Start-Sleep -Seconds 30
          }

          Stop-Job -Job $sentinelJob -ErrorAction SilentlyContinue
          Receive-Job -Job $sentinelJob -ErrorAction SilentlyContinue | Out-Null
          Remove-Job -Job $sentinelJob -ErrorAction SilentlyContinue
          Write-ApexEvent 'SUCCESS' "Sentinel stopped cleanly"

          # ── Handoff (cycle-aware, PAT-aware, jitter) ────────────────────
          $cyclesLeft = [int]$env:CYCLES_INPUT
          if ($cyclesLeft -gt 0) {
              $next = $cyclesLeft - 1
              Write-ApexEvent 'INFO' "Self-dispatching next cycle ($next remaining)..."
              Start-Sleep -Seconds (Get-Random -Min 1 -Max 6)
              $ref = "${{ github.workflow_ref }}"
              $wf = if ($ref) { ($ref -split '/')[-1] -split '@' | Select-Object -First 1 } else { $null }
              if (-not $wf) { $wf = "${{ github.workflow }}" }
              if (-not $wf) { $wf = "rdp-proaccess-apex-ultima.yml" }
              $url = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/$wf/dispatches"
              $hdr = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github+json"; "X-GitHub-Api-Version" = "2022-11-28" }
              $payload = [ordered]@{
                  ts_tailnet       = $env:TS_TAILNET
                  quick_test       = $env:QUICK_TEST
                  runtime_minutes  = $env:RUNTIME_INPUT
                  cycles           = "$next"
                  rdp_count        = $env:rdp_count
                  enable_heartbeat = $env:ENABLE_HEARTBEAT
                  rotate_password  = $env:ROTATE_PASSWORD
              }
              $body = @{ ref = "${{ github.ref_name }}"; inputs = $payload } | ConvertTo-Json -Depth 10
              try {
                  Invoke-RestMethod -Method POST -Uri $url -Headers $hdr -Body $body -ContentType "application/json" -ErrorAction Stop | Out-Null
                  Write-ApexEvent 'SUCCESS' "Handoff dispatched (cycles=$next)"
                  Send-ApexTelegram "🔄 *APEX v4.0 Handoff* | Next cycle ($next left) | $($Global:Apex.Hostname)" | Out-Null
              } catch {
                  Write-ApexEvent 'ERROR' "Handoff failed: $($_.Exception.Message)"
                  Write-ApexEvent 'INFO' "If 403: ensure GH_PAT secret with workflow:dispatch scope is set"
              }
          } else {
              Write-ApexEvent 'SUCCESS' "No more cycles — session ends"
              Send-ApexTelegram "🔴 *APEX v4.0 Session End* | $($Global:Apex.Hostname)" | Out-Null
          }
          Stop-Transcript
